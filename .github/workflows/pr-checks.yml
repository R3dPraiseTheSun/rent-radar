name: PR Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/test_scoring.py -q

  scraper-smoke-tests:
    name: scraper-smoke-tests
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      RUN_LIVE_SCRAPER_TESTS: "true"
      SCRAPER_USER_AGENT: "RentRadarBot/0.1 CI smoke test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev zlib1g-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Live scraper smoke tests
        run: |
          pytest tests/test_scraper_smoke.py -q