name: PR Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_live_scraper_tests:
        description: "Run live scraper smoke tests"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev libjpeg-dev zlib1g-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run unit tests
        run: |
          python -m pytest tests/test_scoring.py tests/test_image_extraction.py -q

  scraper-smoke-tests:
    name: scraper-smoke-tests
    runs-on: ubuntu-latest
    timeout-minutes: 8

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_live_scraper_tests == 'true'

    env:
      PYTHONPATH: ${{ github.workspace }}
      RUN_LIVE_SCRAPER_TESTS: "true"
      SCRAPER_USER_AGENT: "RentRadarBot/0.1 CI smoke test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev libjpeg-dev zlib1g-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Live scraper smoke tests
        run: |
          python -m pytest tests/test_scraper_smoke.py -q